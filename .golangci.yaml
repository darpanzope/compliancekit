run:
  timeout: 5m
  go: "1.26"

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - gofmt
    - goimports
    - revive
    - bodyclose
    - noctx
    - prealloc
    - unconvert
    - unparam

linters-settings:
  goimports:
    local-prefixes: github.com/darpanzope/compliancekit
  misspell:
    locale: US
    ignore-words:
      - godo
      - hcloud
      - kubescape
      - wazero
      - ocsf
      - oscal

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
