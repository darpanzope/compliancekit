# GoReleaser configuration for compliancekit.
#
# What this produces on a `v*.*.*` tag push (see .github/workflows/release.yaml):
#
#   - Cross-compiled binaries: darwin/amd64, darwin/arm64,
#     linux/amd64, linux/arm64. CGO disabled, fully static.
#   - Per-binary tar.gz archives including LICENSE + README + the
#     check catalog so the install image is self-documenting.
#   - checksums.txt over every artifact, SHA-256.
#   - Keyless cosign signature on checksums.txt + each archive,
#     via GitHub Actions OIDC (no long-lived signing key).
#   - SBOM per archive, generated by Syft.
#   - Multi-arch Docker image on ghcr.io/darpanzope/compliancekit,
#     tagged with the version and 'latest'. Stamped with OCI labels
#     so 'docker inspect' shows the source URL, version, and licence.
#   - Homebrew formula pushed to darpanzope/homebrew-tap so
#     'brew install darpanzope/tap/compliancekit' works after release.
#
# Run locally without publishing:
#
#   goreleaser release --snapshot --clean --skip=sign,publish,homebrew,docker

version: 2

project_name: compliancekit

before:
  hooks:
    - go mod tidy
    - go run ./cmd/gencheckdocs -check

builds:
  - id: compliancekit
    main: ./cmd/compliancekit
    binary: compliancekit
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .Date }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: compliancekit
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md
      - SECURITY.md
      - docs/checks.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

sboms:
  - artifacts: archive
    documents:
      - "{{ .ArtifactName }}.sbom.json"

signs:
  # Cosign keyless signature on every release artifact. Uses the
  # ambient GitHub Actions OIDC token (Fulcio), so there is no
  # long-lived private key to manage or to leak. Verifiers must use
  # `cosign verify-blob --certificate-identity-regexp ...` against
  # the public Sigstore log; recipe is in the README.
  - id: cosign
    cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--yes"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"

dockers:
  - id: amd64
    image_templates:
      - "ghcr.io/darpanzope/compliancekit:{{ .Version }}-amd64"
    use: buildx
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=Open-source compliance scanner for cloud and Linux infrastructure"
      - "--label=org.opencontainers.image.url=https://github.com/darpanzope/compliancekit"
      - "--label=org.opencontainers.image.source=https://github.com/darpanzope/compliancekit"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.licenses=MIT"

  - id: arm64
    image_templates:
      - "ghcr.io/darpanzope/compliancekit:{{ .Version }}-arm64"
    use: buildx
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=Open-source compliance scanner for cloud and Linux infrastructure"
      - "--label=org.opencontainers.image.url=https://github.com/darpanzope/compliancekit"
      - "--label=org.opencontainers.image.source=https://github.com/darpanzope/compliancekit"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.licenses=MIT"

docker_manifests:
  - name_template: "ghcr.io/darpanzope/compliancekit:{{ .Version }}"
    image_templates:
      - "ghcr.io/darpanzope/compliancekit:{{ .Version }}-amd64"
      - "ghcr.io/darpanzope/compliancekit:{{ .Version }}-arm64"
  - name_template: "ghcr.io/darpanzope/compliancekit:latest"
    image_templates:
      - "ghcr.io/darpanzope/compliancekit:{{ .Version }}-amd64"
      - "ghcr.io/darpanzope/compliancekit:{{ .Version }}-arm64"

docker_signs:
  - cmd: cosign
    artifacts: manifests
    args:
      - "sign"
      - "--yes"
      - "${artifact}@${digest}"

brews:
  - name: compliancekit
    # Push under Formula/ (Homebrew's expected layout). Without this
    # directive the formula lands at tap root and 'brew install <tap>/
    # <formula>' fails to resolve it.
    directory: Formula
    # The tap is a separate repo we publish to. Requires
    # HOMEBREW_TAP_GITHUB_TOKEN with `contents: write` on the tap.
    repository:
      owner: darpanzope
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/darpanzope/compliancekit
    description: Open-source compliance scanner for cloud and Linux infrastructure -- SOC 2, ISO 27001, CIS
    license: MIT
    test: |
      system "#{bin}/compliancekit version"
    install: |
      bin.install "compliancekit"
    commit_author:
      name: compliancekit-release-bot
      email: noreply@github.com
    commit_msg_template: "compliancekit: brew formula for {{ .Tag }}"

changelog:
  use: github-native
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: darpanzope
    name: compliancekit
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  header: |
    ## compliancekit {{ .Tag }}

    Open-source compliance scanner for cloud and Linux infrastructure.
    See [CHANGELOG below](#changelog) for what changed.

    ### Install

    ```sh
    # macOS (Homebrew)
    brew install darpanzope/tap/compliancekit

    # Linux / macOS (one-line installer)
    curl -sSfL https://raw.githubusercontent.com/darpanzope/compliancekit/main/scripts/install.sh | sh

    # Docker
    docker run --rm ghcr.io/darpanzope/compliancekit:{{ .Version }} version
    ```

    Supply chain: every binary is cosign-signed (keyless via GitHub OIDC)
    and ships with a Syft-generated SBOM. Verification recipe is in the
    [README](https://github.com/darpanzope/compliancekit#install).
  footer: |
    ---
    Full reference: [CLI.md](https://github.com/darpanzope/compliancekit/blob/main/CLI.md) ·
    [CONFIGURATION.md](https://github.com/darpanzope/compliancekit/blob/main/CONFIGURATION.md) ·
    [check catalog](https://github.com/darpanzope/compliancekit/blob/main/docs/checks.md)
