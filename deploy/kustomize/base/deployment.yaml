apiVersion: apps/v1
kind: Deployment
metadata:
  name: daemon
spec:
  # SQLite mode pins to 1; HA overlay overrides + flips the strategy.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: compliancekit
      app.kubernetes.io/component: daemon
  template:
    metadata:
      labels:
        app.kubernetes.io/name: compliancekit
        app.kubernetes.io/component: daemon
    spec:
      serviceAccountName: daemon
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: compliancekit
          # The base kustomization rewrites the tag via the images:
          # field; the registry path stays in sync with the Helm chart.
          # Tag has NO `v` prefix because goreleaser publishes as
          # `1.15.1` (Go module convention). v1.15.1 phase 0 fix.
          image: ghcr.io/darpanzope/compliancekit:2.0.1
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          args:
            - serve
            - --addr=0.0.0.0
            - --port=8080
            - --db=/var/lib/compliancekit/serve.db
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: data
              mountPath: /var/lib/compliancekit
      volumes:
        - name: tmp
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: data
