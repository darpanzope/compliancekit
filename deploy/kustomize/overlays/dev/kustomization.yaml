apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# dev overlay — loopback-friendly insecure-cookies + a 1Gi PVC,
# easy to spin up against minikube / kind. Pulls the latest image
# tag so dev clusters track tip-of-main; pair with --insecure-
# cookies so a plain-HTTP port-forward works.

namespace: compliancekit-dev
nameSuffix: -dev

resources:
  - ../../base

images:
  - name: ghcr.io/darpanzope/compliancekit
    newTag: latest

patches:
  - target:
      kind: Deployment
      name: daemon
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --insecure-cookies
  - target:
      kind: PersistentVolumeClaim
      name: data
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 1Gi
