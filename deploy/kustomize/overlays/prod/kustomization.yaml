apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# prod overlay — HA Postgres mode, 2 replicas, RollingUpdate
# strategy, Ingress + cert-manager. Drops the SQLite PVC + flips
# the deployment to reference the CK_DB_DSN secret instead.

namespace: compliancekit
nameSuffix: ""

resources:
  - ../../base
  - ingress.yaml
  - secret-postgres.yaml

# Drop the SQLite PVC; state lives in Postgres now.
patches:
  - target:
      kind: PersistentVolumeClaim
      name: data
    patch: |-
      $patch: delete
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: data
  - target:
      kind: Deployment
      name: daemon
    path: deployment-ha-patch.yaml

images:
  - name: ghcr.io/darpanzope/compliancekit
    newTag: 1.15.1
