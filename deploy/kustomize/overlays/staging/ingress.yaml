apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: daemon
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
spec:
  ingressClassName: nginx
  rules:
    - host: compliancekit.staging.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: daemon
                port:
                  number: 80
  tls:
    - secretName: compliancekit-staging-tls
      hosts:
        - compliancekit.staging.example.com
