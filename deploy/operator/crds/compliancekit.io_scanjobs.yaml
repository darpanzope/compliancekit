apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: scanjobs.compliancekit.io
spec:
  group: compliancekit.io
  names:
    kind: ScanJob
    listKind: ScanJobList
    singular: scanjob
    plural: scanjobs
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Pod
          type: string
          jsonPath: .status.podName
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              properties:
                image: { type: string }
                args:
                  type: array
                  items: { type: string }
                evidencePackPVC: { type: string }
                envFromSecret: { type: string }
            status:
              type: object
              properties:
                phase: { type: string }
                podName: { type: string }
                startTime: { type: string, format: date-time }
                completionTime: { type: string, format: date-time }
                conditions:
                  type: array
                  items: { type: object, x-kubernetes-preserve-unknown-fields: true }
