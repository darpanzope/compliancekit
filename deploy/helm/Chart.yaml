apiVersion: v2
name: compliancekit
description: |
  Open-source compliance scanner for cloud and Linux infrastructure.
  Single-binary daemon with a REST API + web UI; ships SQLite by
  default + opt-in HA Postgres mode.
type: application

# Chart version follows the daemon image version. Bump together when
# a release cuts a new tag.
#
# appVersion has NO `v` prefix because goreleaser publishes the OCI
# image as `ghcr.io/darpanzope/compliancekit:2.0.1` (Go module
# convention — `.Version` template strips the `v`). The Helm helper
# `compliancekit.image` defaults the image tag to `appVersion`, so a
# `v` here pulls a non-existent tag. Audit caught this against
# v1.15.0 — see v1.15.1 phase 0; v1.19.1 audit re-synced the whole
# deploy/ tree (it had drifted to 1.15.x across v1.16–v1.19) +
# added deploy/scripts/version-check.sh as the recurrence guard.
version: 2.0.1
appVersion: "2.0.1"

home: https://github.com/darpanzope/compliancekit
sources:
  - https://github.com/darpanzope/compliancekit

icon: https://raw.githubusercontent.com/darpanzope/compliancekit/main/internal/server/assets/icon-512.png

maintainers:
  - name: Darpan Zope
    url: https://github.com/darpanzope

keywords:
  - compliance
  - security
  - audit
  - cis
  - soc2
  - iso27001
  - kubernetes
  - aws
  - gcp
  - digitalocean
  - hetzner

annotations:
  artifacthub.io/license: MIT
  artifacthub.io/category: security
  artifacthub.io/changes: |
    - kind: fixed
      description: Pin appVersion to the published image tag (was `v1.15.0`, real image is `1.15.0`)
    - kind: added
      description: Initial chart release at v1.15.0 (Deploy & operate milestone)
