{{- /*
Rendered only when HA mode is on AND the operator hasn't supplied
an existing Secret. The default DSN is a placeholder — production
deployments must override values.yaml ha.postgres.dsn or, better,
point ha.postgres.existingSecret at a pre-created Secret managed
by sealed-secrets / external-secrets / SOPS.
*/ -}}
{{- if and .Values.ha.enabled (not .Values.ha.postgres.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "compliancekit.fullname" . }}-postgres
  labels:
    {{- include "compliancekit.labels" . | nindent 4 }}
type: Opaque
stringData:
  dsn: {{ .Values.ha.postgres.dsn | quote }}
{{- end -}}
