name: release

# Triggered when a v*.*.* tag is pushed. The workflow:
#
#   1. Restores the full git history (goreleaser computes changelog
#      from the range between the previous tag and HEAD).
#   2. Sets up Go, Docker buildx, syft (SBOM), cosign (signing).
#   3. Logs into GHCR using the workflow's ambient GITHUB_TOKEN so
#      Docker manifests can be pushed to ghcr.io/darpanzope/*.
#   4. Runs `goreleaser release` which assembles binaries, archives,
#      checksums, SBOMs, Docker images, cosign signatures, the
#      GitHub Release, and the Homebrew formula push -- per the
#      .goreleaser.yaml in the repo root.
#
# Required secrets (configured at repo or org level):
#
#   - HOMEBREW_TAP_GITHUB_TOKEN: a fine-grained PAT with
#     contents: write on darpanzope/homebrew-tap. GoReleaser uses
#     this to push the brew formula update.
#
# Required permissions (set on the job, not the workflow):
#
#   - contents: write -- create the GitHub Release.
#   - packages: write -- push to GHCR.
#   - id-token: write -- mint the OIDC token cosign uses to sign
#     artifacts via Fulcio. This is what makes the signatures
#     keyless: no long-lived key in a secret.

on:
  push:
    tags: [ 'v*.*.*' ]

permissions:
  contents: read

env:
  GO_VERSION: '1.26'

jobs:
  release:
    # v0.11 (Kubernetes) added k8s.io/client-go and tripled the binary
    # size ~50MB -> ~154MB. v0.12.0's first three release attempts
    # OOM-pattern-killed the runner during four parallel goreleaser
    # cross-compiles on this same host. Fix is the `--parallelism 2`
    # CLI flag on the goreleaser step below: capping concurrent links
    # keeps the host comfortably under the 16GB RAM ceiling while
    # holding wall time at ~17 min, same as v0.11.
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for goreleaser's changelog

      # actions/setup-go@v5 enables module + build cache by default
      # (keyed on go.sum), but pinning the cache-dependency-path
      # is explicit-is-better-than-implicit and lets us reason about
      # cache misses if any.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: true
          cache-dependency-path: go.sum

      # Cache goreleaser's dist/ output keyed against the goreleaser
      # config + go.sum. setup-go@v5 with cache:true already owns
      # ~/.cache/go-build + ~/go/pkg/mod; overlapping those paths in
      # a second actions/cache@v4 step causes tar restore conflicts
      # ("Cannot open: File exists") and silently disables the cache.
      - name: Cache goreleaser dist/
        uses: actions/cache@v4
        with:
          path: ./dist
          key: goreleaser-dist-${{ runner.os }}-${{ hashFiles('go.sum', '.goreleaser.yaml') }}
          restore-keys: |
            goreleaser-dist-${{ runner.os }}-

      # Expose ACTIONS_RUNTIME_TOKEN + ACTIONS_CACHE_URL to subprocesses
      # so buildx can read/write the GitHub Actions cache backend the
      # docker `--cache-from/to=type=gha` flags in .goreleaser.yaml
      # rely on. Without this step the cache silently misses (no error,
      # just no speedup).
      - name: Expose GitHub Actions runtime to buildx
        uses: crazy-max/ghaction-github-runtime@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU (for arm64 image build on amd64 runner)
        uses: docker/setup-qemu-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@v0

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          # --parallelism 2 caps concurrent cross-compiles. Default
          # is runtime.GOMAXPROCS (4 on ubuntu-latest); 4 parallel
          # Go links of a ~160MB binary saturate the runner's RAM
          # and triggered SIGTERM-pattern failures in v0.12.0's
          # first attempts. parallelism is a goreleaser CLI flag,
          # not a YAML field — `builds[].parallelism` is rejected
          # at config parse with "field parallelism not found in
          # type config.Build".
          args: release --clean --parallelism 2
        env:
          # Ambient token for the GitHub Release + GHCR push.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fine-grained PAT for pushing the Homebrew formula to
          # darpanzope/homebrew-tap. Create this with
          # contents: write on the tap repo only.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          # Tells cosign to use the ambient OIDC token rather than
          # prompting for a browser-based one.
          COSIGN_EXPERIMENTAL: 'true'
