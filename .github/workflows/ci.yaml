name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Pin the Go version once and reuse so setup-go, the linter build,
# and the cross-compile all agree. Bumping is a one-line change.
env:
  GO_VERSION: '1.26'
  GOLANGCI_LINT_VERSION: v1.64.8

jobs:
  ci:
    # v0.11 added k8s.io/client-go (the K8s collector), which tripled
    # the compile workload across lint + race-tests + build. The
    # previous 10-min cap was already at the edge for v0.10; v0.11
    # blew past it. 30 min gives meaningful headroom without being
    # absurd.
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
          cache: true
          cache-dependency-path: go.sum

      # Cache the golangci-lint analysis cache only. setup-go@v5 with
      # cache:true already owns ~/.cache/go-build + ~/go/pkg/mod;
      # overlapping those paths in a second actions/cache@v6 step
      # causes tar restore conflicts ("Cannot open: File exists") and
      # silently disables the cache. v0.12's original belt-and-
      # suspenders cache learned this the hard way.
      - name: Cache golangci-lint analysis
        uses: actions/cache@v6
        with:
          path: ~/.cache/golangci-lint
          key: golangci-${{ runner.os }}-go${{ env.GO_VERSION }}-${{ hashFiles('go.sum', '.golangci.yaml') }}
          restore-keys: |
            golangci-${{ runner.os }}-go${{ env.GO_VERSION }}-

      # Build golangci-lint from source against the runner's Go (1.26+)
      # instead of using the action's prebuilt v1.64.x binary, which is
      # built with Go 1.24 and refuses to load a config targeting any
      # newer Go. Slight cost (~30s vs ~5s for the binary) but reliable
      # and version-aligned with go.mod.
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@${{ env.GOLANGCI_LINT_VERSION }}

      - name: Lint
        run: golangci-lint run --timeout=5m

      - name: Test
        # -short skips the v1.11 bench harness (100k-row seed). The
        # 120s timeout matches the Makefile bump landed at v1.12 to
        # accommodate the v1.12+ ui-test surface under -race.
        run: go test -race -short -timeout=120s ./...

      # v1.0 external-embedder contract test. Compiles under
      # -tags=external and uses ONLY the exported surface of
      # pkg/compliancekit (package compliancekit_test), proving the
      # promoted API is sufficient for downstream consumers to
      # actually build a working integration. Catches accidental
      # contract narrowing (e.g. an unexported method an embedder
      # was relying on) that the api.txt diff alone can miss.
      - name: External embed test
        run: go test -tags=external -timeout=120s ./pkg/compliancekit/...

      # Fails when the committed docs/checks.md drifts from the live
      # check registry. Forces a new or renamed check to ship with a
      # regenerated catalogue in the same PR.
      - name: Check catalogue freshness
        run: go run ./cmd/gencheckdocs -check

      # v1.0 SemVer gate. Fails when the committed pkg/compliancekit/
      # api.txt drifts from the public package's exported surface, so
      # an accidental addition / rename / removal cannot land without
      # an explicit, reviewed diff to api.txt. The api.txt diff in the
      # PR is the proof the contract was intentionally changed.
      - name: Check public API surface freshness
        run: go run ./cmd/genapi -check

      - name: Build (linux/amd64)
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: go build -trimpath -ldflags="-s -w" -o /tmp/compliancekit-linux-amd64 ./cmd/compliancekit

      - name: Build (darwin/arm64)
        env:
          CGO_ENABLED: "0"
          GOOS: darwin
          GOARCH: arm64
        run: go build -trimpath -ldflags="-s -w" -o /tmp/compliancekit-darwin-arm64 ./cmd/compliancekit
