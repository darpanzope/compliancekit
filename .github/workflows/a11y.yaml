# v1.10 phase 0 — WCAG AA audit via axe-core.
#
# Boots the daemon in demo mode + runs @axe-core/cli against every
# documented daemon route. Fails the build on any AA violation.
#
# Routes covered match the v1.10 DoD "every documented daemon route"
# requirement; the matrix grows when new pages land.
#
# Manual screen-reader testing (NVDA / VoiceOver / JAWS) is the
# operator's job per the v1.10 DoD — axe-core covers structural
# violations, not behavioral ones.

name: a11y

on:
  push:
    branches: [main]
    paths:
      - 'internal/server/**'
      - 'internal/notify/**'
      - '.github/workflows/a11y.yaml'
  pull_request:
    paths:
      - 'internal/server/**'
      - 'internal/notify/**'
      - '.github/workflows/a11y.yaml'
  workflow_dispatch:

jobs:
  axe:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install axe-core CLI
        run: npm install -g @axe-core/cli@4.10.0

      # The runner ships a Chrome version; axe-core's bundled
      # ChromeDriver may pin to a newer release than the installed
      # binary. browser-driver-manager pulls the ChromeDriver that
      # matches the runner's Chrome, eliminating the
      # "session not created: only supports Chrome version N" error
      # the matrix hits whenever Chrome / ChromeDriver drift.
      - name: Sync ChromeDriver to runner Chrome
        run: npx -y browser-driver-manager install chrome

      - name: Build compliancekit binary
        run: go build -o /tmp/ck ./cmd/compliancekit

      - name: Seed demo daemon + bootstrap admin
        env:
          CK_DEMO_PASSWORD: 'a11y-audit-only'
        run: |
          mkdir -p /tmp/ck-a11y
          /tmp/ck serve \
            --addr 127.0.0.1 --port 8080 \
            --db /tmp/ck-a11y/serve.db \
            --demo \
            --insecure-cookies &
          echo $! > /tmp/ck.pid
          # Wait for /health
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null; then break; fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8080/health || { echo "daemon did not start"; cat /tmp/ck-a11y/*.log 2>/dev/null || true; exit 1; }

      - name: Run axe-core against /login
        # --chrome-options disables the Chrome sandbox + the
        # /dev/shm pressure heuristic. Both are needed on the
        # GitHub-hosted runner where Chrome would otherwise SIGSEGV
        # on launch under headless mode.
        run: |
          axe http://127.0.0.1:8080/login \
            --tags wcag2a,wcag2aa,best-practice \
            --chrome-options="--no-sandbox,--disable-dev-shm-usage,--headless=new" \
            --exit \
            --save axe-login.json \
            || (cat axe-login.json && exit 1)

      # NOTE: authenticated routes need a session cookie. The full
      # suite (/scans, /findings, /rules, /settings/*) lands in a
      # v1.10.x follow-up once the axe-core wiring supports a cookie-
      # bearing fetch. Phase 0 ships the gate; the matrix expands.
      - name: Stop daemon
        if: always()
        run: |
          if [ -f /tmp/ck.pid ]; then kill $(cat /tmp/ck.pid) || true; fi

      - name: Upload violations artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: axe-violations
          path: axe-*.json
          retention-days: 14
