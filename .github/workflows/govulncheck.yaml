name: govulncheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily run picks up newly-disclosed advisories against unchanged code.
    - cron: '0 6 * * *'

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          # Keep aligned with go.mod and ci.yaml's GO_VERSION. Newer
          # patch releases include stdlib CVE fixes that older lines
          # may not backport (we hit this with 1.24 → 1.25 stdlib).
          go-version: '1.26'
          check-latest: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Scan
        # ./... covers source; -mode=binary on a built artifact would
        # be stricter but we cross-compile per-platform in ci.yaml.
        run: govulncheck ./...
