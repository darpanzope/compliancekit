    tags: [k8s, liveness-probe]
  CKV_K8S_20:
    controls:
      - { framework: soc2,           control: CC6.1 }
      - { framework: nist-800-53-r5, control: AC-6 }
      - { framework: cis-v8,         control: "4.1" }
    severity: medium
    tags: [k8s, allow-privilege-escalation]
  CKV_K8S_22:
    controls:
      - { framework: soc2,           control: CC6.1 }
      - { framework: nist-800-53-r5, control: AC-3 }
    severity: medium
    tags: [k8s, read-only-rootfs]
  CKV_K8S_23:
    controls:
      - { framework: soc2,           control: CC6.1 }
      - { framework: cis-v8,         control: "4.6" }
    severity: medium
    tags: [k8s, runs-as-non-root]

  # ------------------------------------------------------------------
  # Docker
  # ------------------------------------------------------------------
  CKV_DOCKER_2:
    controls:
      - { framework: soc2,           control: A1.1 }
      - { framework: cis-v8,         control: "4.6" }
    severity: low
    tags: [docker, healthcheck]
  CKV_DOCKER_3:
    controls:
      - { framework: soc2,           control: CC6.1 }
      - { framework: cis-v8,         control: "4.6" }
