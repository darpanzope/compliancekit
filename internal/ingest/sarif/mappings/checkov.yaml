    tags: [docker, user-non-root]

  # ------------------------------------------------------------------
  # GCP / Azure highlights
  # ------------------------------------------------------------------
  CKV_GCP_29:
    controls:
      - { framework: soc2,           control: CC6.7 }
      - { framework: nist-800-53-r5, control: SC-28 }
