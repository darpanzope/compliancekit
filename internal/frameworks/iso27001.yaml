# ISO/IEC 27001:2022 Annex A
#
# Source: ISO/IEC 27001:2022 Information security, cybersecurity and
# privacy protection — Information security management systems —
# Requirements, Annex A (Reference set of information security
# controls).
#
# The 2022 revision restructures Annex A into four themes (A.5
# Organizational, A.6 People, A.7 Physical, A.8 Technological)
# totalling 93 controls, down from 114 in the 2013 version.
#
# v0.12 expands this catalog from the subset referenced by v0.3-era
# checks (37 controls) to the full Annex A surface so every check's
# mapping resolves and so operators get full SoA coverage.

id: iso27001
name: ISO/IEC 27001:2022 Annex A
version: "2022"
category: compliance
source: ISO/IEC 27001:2022 Annex A — Reference set of information security controls
url: https://www.iso.org/standard/27001
description: |
  ISO/IEC 27001 is the international standard for information security
  management systems (ISMS). Annex A defines a reference set of
  controls that an organization selects from based on its risk
  assessment. The 2022 revision collapses 114 controls into 93 across
  four themes: Organizational (A.5), People (A.6), Physical (A.7),
  and Technological (A.8).

controls:
  # ---- A.5 Organizational controls ----

  A.5.1:
    name: Policies for information security
    family: organizational
    description: |
      Information security policy and topic-specific policies shall be
      defined, approved by management, published, communicated to and
      acknowledged by relevant personnel and relevant interested
      parties, and reviewed at planned intervals or if significant
      changes occur.

  A.5.2:
    name: Information security roles and responsibilities
    family: organizational
    description: |
      Information security roles and responsibilities shall be defined
      and allocated according to the organization's needs.

  A.5.3:
    name: Segregation of duties
    family: organizational
    description: |
      Conflicting duties and conflicting areas of responsibility shall
      be segregated.

  A.5.4:
    name: Management responsibilities
    family: organizational
    description: |
      Management shall require all personnel to apply information
      security in accordance with the established information security
      policy, topic-specific policies, and procedures of the organization.

  A.5.5:
    name: Contact with authorities
    family: organizational
    description: |
      The organization shall establish and maintain contact with
      relevant authorities.

  A.5.6:
    name: Contact with special interest groups
    family: organizational
    description: |
      The organization shall establish and maintain contact with
      special interest groups or other specialist security forums
      and professional associations.

  A.5.7:
    name: Threat intelligence
    family: organizational
    description: |
      Information relating to information security threats shall be
      collected and analyzed to produce threat intelligence.

  A.5.8:
    name: Information security in project management
    family: organizational
    description: |
      Information security shall be integrated into project management.

  A.5.9:
    name: Inventory of information and other associated assets
    family: organizational
    description: |
      An inventory of information and other associated assets, including
      owners, shall be developed and maintained.

  A.5.10:
    name: Acceptable use of information and other associated assets
    family: organizational
    description: |
      Rules for the acceptable use and procedures for handling
      information and other associated assets shall be identified,
      documented, and implemented.

  A.5.11:
    name: Return of assets
    family: organizational
    description: |
      Personnel and other interested parties as appropriate shall
      return all the organization's assets in their possession upon
      change or termination of their employment, contract, or agreement.

  A.5.12:
    name: Classification of information
    family: organizational
    description: |
      Information shall be classified according to the information
      security needs of the organization based on confidentiality,
      integrity, availability, and relevant interested party
      requirements.

  A.5.13:
    name: Labelling of information
    family: organizational
    description: |
      An appropriate set of procedures for information labelling shall
      be developed and implemented in accordance with the information
      classification scheme adopted by the organization.

  A.5.14:
    name: Information transfer
    family: organizational
    description: |
      Information transfer rules, procedures, or agreements shall be
      in place for all types of transfer facilities within the
      organization and between the organization and other parties.

  A.5.15:
    name: Access control
    family: organizational
    description: |
      Rules to control physical and logical access to information and
      other associated assets shall be established and implemented
      based on business and information security requirements.

  A.5.16:
    name: Identity management
    family: organizational
    description: |
      The full life cycle of identities shall be managed.

  A.5.17:
    name: Authentication information
    family: organizational
    description: |
      Allocation and management of authentication information shall be
      controlled by a management process, including advising personnel
      on appropriate handling of authentication information.

  A.5.18:
    name: Access rights
    family: organizational
    description: |
      Access rights to information and other associated assets shall
      be provisioned, reviewed, modified, and removed in accordance
      with the organization's topic-specific policy on and rules for
      access control.

  A.5.19:
    name: Information security in supplier relationships
    family: organizational
    description: |
      Processes and procedures shall be defined and implemented to
      manage the information security risks associated with the use of
      supplier's products or services.

  A.5.20:
    name: Addressing information security within supplier agreements
    family: organizational
    description: |
      Relevant information security requirements shall be established
      and agreed with each supplier based on the type of supplier
      relationship.

  A.5.21:
    name: Managing information security in the ICT supply chain
    family: organizational
    description: |
      Processes and procedures shall be defined and implemented to
      manage the information security risks associated with the ICT
      products and services supply chain.

  A.5.22:
    name: Monitoring, review, and change management of supplier services
    family: organizational
    description: |
      The organization shall regularly monitor, review, evaluate, and
      manage change in supplier information security practices and
      service delivery.

  A.5.23:
    name: Information security for use of cloud services
    family: organizational
    description: |
      Processes for acquisition, use, management, and exit from cloud
      services shall be established in accordance with the
      organization's information security requirements.

  A.5.24:
    name: Information security incident management planning and preparation
    family: organizational
    description: |
      The organization shall plan and prepare for managing information
      security incidents by defining, establishing, and communicating
      information security incident management processes, roles, and
      responsibilities.

  A.5.25:
    name: Assessment and decision on information security events
    family: organizational
    description: |
      The organization shall assess information security events and
      decide if they are to be categorized as information security
      incidents.

  A.5.26:
    name: Response to information security incidents
    family: organizational
    description: |
      Information security incidents shall be responded to in
      accordance with the documented procedures.

  A.5.27:
    name: Learning from information security incidents
    family: organizational
    description: |
      Knowledge gained from information security incidents shall be
      used to strengthen and improve the information security controls.

  A.5.28:
    name: Collection of evidence
    family: organizational
    description: |
      The organization shall establish and implement procedures for
      the identification, collection, acquisition, and preservation of
      evidence related to information security events.

  A.5.29:
    name: Information security during disruption
    family: organizational
    description: |
      The organization shall plan how to maintain information security
      at an appropriate level during disruption.

  A.5.30:
    name: ICT readiness for business continuity
    family: organizational
    description: |
      ICT readiness shall be planned, implemented, maintained, and
      tested based on business continuity objectives and ICT
      continuity requirements.

  A.5.31:
    name: Legal, statutory, regulatory, and contractual requirements
    family: organizational
    description: |
      Legal, statutory, regulatory, and contractual requirements
      relevant to information security and the organization's approach
      to meet these requirements shall be identified, documented, and
      kept up to date.

  A.5.32:
    name: Intellectual property rights
    family: organizational
    description: |
      The organization shall implement appropriate procedures to
      protect intellectual property rights.

  A.5.33:
    name: Protection of records
    family: organizational
    description: |
      Records shall be protected from loss, destruction, falsification,
      unauthorized access, and unauthorized release.

  A.5.34:
    name: Privacy and protection of PII
    family: organizational
    description: |
      The organization shall identify and meet the requirements
      regarding the preservation of privacy and protection of
      personally identifiable information (PII) according to
      applicable laws and regulations and contractual requirements.

  A.5.35:
    name: Independent review of information security
    family: organizational
    description: |
      The organization's approach to managing information security
      and its implementation including people, processes, and
      technologies shall be reviewed independently at planned
      intervals, or when significant changes occur.

  A.5.36:
    name: Compliance with policies, rules, and standards for information security
    family: organizational
    description: |
      Compliance with the organization's information security policy,
      topic-specific policies, rules, and standards shall be regularly
      reviewed.

  A.5.37:
    name: Documented operating procedures
    family: organizational
    description: |
      Operating procedures for information processing facilities shall
      be documented and made available to personnel who need them.

  # ---- A.6 People controls ----

  A.6.1:
    name: Screening
    family: people
    description: |
      Background verification checks on all candidates to become
      personnel shall be carried out prior to joining the organization
      and on an ongoing basis taking into consideration applicable
      laws, regulations, ethics, and shall be proportional to the
      business requirements.

  A.6.2:
    name: Terms and conditions of employment
    family: people
    description: |
      Employment contractual agreements shall state the personnel's
      and the organization's responsibilities for information security.

  A.6.3:
    name: Information security awareness, education, and training
    family: people
    description: |
      Personnel of the organization and relevant interested parties
      shall receive appropriate information security awareness,
      education, and training and regular updates of the
      organization's information security policy, topic-specific
      policies, and procedures, as relevant for their job function.

  A.6.4:
    name: Disciplinary process
    family: people
    description: |
      A disciplinary process shall be formalized and communicated to
      take actions against personnel and other relevant interested
      parties who have committed an information security policy
      violation.

  A.6.5:
    name: Responsibilities after termination or change of employment
    family: people
    description: |
      Information security responsibilities and duties that remain
      valid after termination or change of employment shall be
      defined, enforced, and communicated to relevant personnel and
      other interested parties.

  A.6.6:
    name: Confidentiality or non-disclosure agreements
    family: people
    description: |
      Confidentiality or non-disclosure agreements reflecting the
      organization's needs for the protection of information shall be
      identified, documented, regularly reviewed, and signed by
      personnel and other relevant interested parties.

  A.6.7:
    name: Remote working
    family: people
    description: |
      Security measures shall be implemented when personnel are
      working remotely to protect information accessed, processed,
      or stored outside the organization's premises.

  A.6.8:
    name: Information security event reporting
    family: people
    description: |
      The organization shall provide a mechanism for personnel to
      report observed or suspected information security events
      through appropriate channels in a timely manner.

  # ---- A.7 Physical controls ----

  A.7.1:
    name: Physical security perimeters
    family: physical
    description: |
      Security perimeters shall be defined and used to protect areas
      that contain information and other associated assets.

  A.7.2:
    name: Physical entry
    family: physical
    description: |
      Secure areas shall be protected by appropriate entry controls
      and access points.

  A.7.3:
    name: Securing offices, rooms, and facilities
    family: physical
    description: |
      Physical security for offices, rooms, and facilities shall be
      designed and implemented.

  A.7.4:
    name: Physical security monitoring
    family: physical
    description: |
      Premises shall be continuously monitored for unauthorized
      physical access.

  A.7.5:
    name: Protecting against physical and environmental threats
    family: physical
    description: |
      Protection against physical and environmental threats, such as
      natural disasters and other intentional or unintentional
      physical threats to infrastructure, shall be designed and
      implemented.

  A.7.6:
    name: Working in secure areas
    family: physical
    description: |
      Security measures for working in secure areas shall be designed
      and implemented.

  A.7.7:
    name: Clear desk and clear screen
    family: physical
    description: |
      Clear desk rules for papers and removable storage media and
      clear screen rules for information processing facilities shall
      be defined and appropriately enforced.

  A.7.8:
    name: Equipment siting and protection
    family: physical
    description: |
      Equipment shall be sited securely and protected.

  A.7.9:
    name: Security of assets off-premises
    family: physical
    description: |
      Off-site assets shall be protected.

  A.7.10:
    name: Storage media
    family: physical
    description: |
      Storage media shall be managed through their life cycle of
      acquisition, use, transportation, and disposal in accordance
      with the organization's classification scheme and handling
      requirements.

  A.7.11:
    name: Supporting utilities
    family: physical
    description: |
      Information processing facilities shall be protected from power
      failures and other disruptions caused by failures in supporting
      utilities.

  A.7.12:
    name: Cabling security
    family: physical
    description: |
      Cables carrying power, data, or supporting information services
      shall be protected from interception, interference, or damage.

  A.7.13:
    name: Equipment maintenance
    family: physical
    description: |
      Equipment shall be maintained correctly to ensure availability,
      integrity, and confidentiality of information.

  A.7.14:
    name: Secure disposal or re-use of equipment
    family: physical
    description: |
      Items of equipment containing storage media shall be verified
      to ensure that any sensitive data and licensed software has
      been removed or securely overwritten prior to disposal or re-use.

  # ---- A.8 Technological controls ----

  A.8.1:
    name: User endpoint devices
    family: technological
    description: |
      Information stored on, processed by, or accessible via user
      endpoint devices shall be protected.

  A.8.2:
    name: Privileged access rights
    family: technological
    description: |
      The allocation and use of privileged access rights shall be
      restricted and managed.

  A.8.3:
    name: Information access restriction
    family: technological
    description: |
      Access to information and other associated assets shall be
      restricted in accordance with the established topic-specific
      policy on access control.

  A.8.4:
    name: Access to source code
    family: technological
    description: |
      Read and write access to source code, development tools, and
      software libraries shall be appropriately managed.

  A.8.5:
    name: Secure authentication
    family: technological
    description: |
      Secure authentication technologies and procedures shall be
      implemented based on information access restrictions and the
      topic-specific policy on access control.

  A.8.6:
    name: Capacity management
    family: technological
    description: |
      The use of resources shall be monitored and adjusted in line
      with current and expected capacity requirements.

  A.8.7:
    name: Protection against malware
    family: technological
    description: |
      Protection against malware shall be implemented and supported
      by appropriate user awareness.

  A.8.8:
    name: Management of technical vulnerabilities
    family: technological
    description: |
      Information about technical vulnerabilities of information
      systems in use shall be obtained, the organization's exposure
      to such vulnerabilities shall be evaluated, and appropriate
      measures taken.

  A.8.9:
    name: Configuration management
    family: technological
    description: |
      Configurations, including security configurations, of hardware,
      software, services, and networks shall be established,
      documented, implemented, monitored, and reviewed.

  A.8.10:
    name: Information deletion
    family: technological
    description: |
      Information stored in information systems, devices, or in any
      other storage media shall be deleted when no longer required.

  A.8.11:
    name: Data masking
    family: technological
    description: |
      Data masking shall be used in accordance with the
      organization's topic-specific policy on access control and
      other related topic-specific policies, and business
      requirements, taking applicable legislation into consideration.

  A.8.12:
    name: Data leakage prevention
    family: technological
    description: |
      Data leakage prevention measures shall be applied to systems,
      networks, and any other devices that process, store, or
      transmit sensitive information.

  A.8.13:
    name: Information backup
    family: technological
    description: |
      Backup copies of information, software, and systems shall be
      maintained and regularly tested in accordance with the agreed
      topic-specific policy on backup.

  A.8.14:
    name: Redundancy of information processing facilities
    family: technological
    description: |
      Information processing facilities shall be implemented with
      redundancy sufficient to meet availability requirements.

  A.8.15:
    name: Logging
    family: technological
    description: |
      Logs that record activities, exceptions, faults, and other
      relevant events shall be produced, stored, protected, and
      analyzed.

  A.8.16:
    name: Monitoring activities
    family: technological
    description: |
      Networks, systems, and applications shall be monitored for
      anomalous behavior and appropriate actions taken to evaluate
      potential information security incidents.

  A.8.17:
    name: Clock synchronization
    family: technological
    description: |
      The clocks of information processing systems used by the
      organization shall be synchronized to approved time sources.

  A.8.18:
    name: Use of privileged utility programs
    family: technological
    description: |
      The use of utility programs that can be capable of overriding
      system and application controls shall be restricted and
      tightly controlled.

  A.8.19:
    name: Installation of software on operational systems
    family: technological
    description: |
      Procedures and measures shall be implemented to securely manage
      software installation on operational systems.

  A.8.20:
    name: Networks security
    family: technological
    description: |
      Networks and network devices shall be secured, managed, and
      controlled to protect information in systems and applications.

  A.8.21:
    name: Security of network services
    family: technological
    description: |
      Security mechanisms, service levels, and service requirements
      of network services shall be identified, implemented, and
      monitored.

  A.8.22:
    name: Segregation of networks
    family: technological
    description: |
      Groups of information services, users, and information systems
      shall be segregated in the organization's networks.

  A.8.23:
    name: Web filtering
    family: technological
    description: |
      Access to external websites shall be managed to reduce
      exposure to malicious content.

  A.8.24:
    name: Use of cryptography
    family: technological
    description: |
      Rules for the effective use of cryptography, including
      cryptographic key management, shall be defined and implemented.

  A.8.25:
    name: Secure development life cycle
    family: technological
    description: |
      Rules for the secure development of software and systems shall
      be established and applied.

  A.8.26:
    name: Application security requirements
    family: technological
    description: |
      Information security requirements shall be identified,
      specified, and approved when developing or acquiring
      applications.

  A.8.27:
    name: Secure system architecture and engineering principles
    family: technological
    description: |
      Principles for engineering secure systems shall be established,
      documented, maintained, and applied to any information system
      development activities.

  A.8.28:
    name: Secure coding
    family: technological
    description: |
      Secure coding principles shall be applied to software
      development.

  A.8.29:
    name: Security testing in development and acceptance
    family: technological
    description: |
      Security testing processes shall be defined and implemented in
      the development life cycle.

  A.8.30:
    name: Outsourced development
    family: technological
    description: |
      The organization shall direct, monitor, and review the
      activities related to outsourced system development.

  A.8.31:
    name: Separation of development, test, and production environments
    family: technological
    description: |
      Development, testing, and production environments shall be
      separated and secured.

  A.8.32:
    name: Change management
    family: technological
    description: |
      Changes to information processing facilities and information
      systems shall be subject to change management procedures.

  A.8.33:
    name: Test information
    family: technological
    description: |
      Test information shall be appropriately selected, protected,
      and managed.

  A.8.34:
    name: Protection of information systems during audit testing
    family: technological
    description: |
      Audit tests and other assurance activities involving
      assessment of operational systems shall be planned and agreed
      between the tester and appropriate management.
