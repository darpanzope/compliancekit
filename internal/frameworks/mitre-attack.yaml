# MITRE ATT&CK Enterprise — Adversary Tactics, Techniques, and Procedures
#
# Source: MITRE ATT&CK Enterprise Matrix
# (https://attack.mitre.org/matrices/enterprise/).
#
# ATT&CK is fundamentally different from compliance frameworks:
# instead of a control catalog, it's a kill-chain matrix. Adversary
# behavior is organized into Tactics (the "why") and Techniques (the
# "how"). Compliancekit maps a check that prevents or detects a
# specific technique to that technique's ID (T1078, T1110, etc.).
#
# This file is tagged category=threat_model so the reporter (Phase 8)
# can render it as a matrix view rather than a control checklist.
#
# v0.12 ships the cloud-relevant subset: ~40 techniques across the
# Initial Access, Execution, Persistence, Privilege Escalation,
# Defense Evasion, Credential Access, Discovery, Lateral Movement,
# Collection, and Impact tactics. Future versions can expand the
# technique catalog without schema changes.

id: mitre-attack
name: MITRE ATT&CK Enterprise
version: "v15 (2024)"
category: threat_model
source: MITRE Corporation — ATT&CK for Enterprise
url: https://attack.mitre.org/matrices/enterprise/
description: |
  MITRE ATT&CK is a globally-accessible knowledge base of adversary
  tactics and techniques based on real-world observations. The
  Enterprise matrix covers techniques targeting Windows, macOS,
  Linux, cloud infrastructure (AWS, Azure, GCP, IaaS, SaaS, Office
  365, Google Workspace), containers, and network devices. Use this
  framework as the kill-chain lens on findings — checks that prevent
  T1078 (Valid Accounts) are different in nature from checks that
  detect T1110 (Brute Force), and the reporter surfaces both.

tactics:
  - id: TA0001
    name: Initial Access
    description: The adversary is trying to get into your network.
  - id: TA0002
    name: Execution
    description: The adversary is trying to run malicious code.
  - id: TA0003
    name: Persistence
    description: The adversary is trying to maintain their foothold.
  - id: TA0004
    name: Privilege Escalation
    description: The adversary is trying to gain higher-level permissions.
  - id: TA0005
    name: Defense Evasion
    description: The adversary is trying to avoid being detected.
  - id: TA0006
    name: Credential Access
    description: The adversary is trying to steal account names and passwords.
  - id: TA0007
    name: Discovery
    description: The adversary is trying to figure out your environment.
  - id: TA0008
    name: Lateral Movement
    description: The adversary is trying to move through your environment.
  - id: TA0009
    name: Collection
    description: The adversary is trying to gather data of interest to their goal.
  - id: TA0010
    name: Exfiltration
    description: The adversary is trying to steal data.
  - id: TA0011
    name: Command and Control
    description: The adversary is trying to communicate with compromised systems to control them.
  - id: TA0040
    name: Impact
    description: The adversary is trying to manipulate, interrupt, or destroy your systems and data.

controls:
  # Techniques are modeled as Controls so the existing finding-to-
  # control mapping machinery works without code changes. The
  # `tags` array carries the tactic ID(s) the technique belongs to.

  # ---- TA0001 Initial Access ----

  T1078:
    name: Valid Accounts
    family: initial-access
    tags: [TA0001, TA0003, TA0004, TA0005]
    description: |
      Adversaries may obtain and abuse credentials of existing
      accounts as a means of gaining Initial Access, Persistence,
      Privilege Escalation, or Defense Evasion. Includes default,
      local, domain, and cloud accounts.

  "T1078.001":
    name: Default Accounts
    family: initial-access
    tags: [TA0001, TA0003, TA0004, TA0005]
    description: |
      Adversaries may obtain and abuse credentials of a default
      account as a means of gaining Initial Access, Persistence,
      Privilege Escalation, or Defense Evasion.

  "T1078.004":
    name: Cloud Accounts
    family: initial-access
    tags: [TA0001, TA0003, TA0004, TA0005]
    description: |
      Adversaries may obtain and abuse credentials of a cloud
      account. Compromised credentials may be used to bypass access
      controls placed on various resources.

  T1190:
    name: Exploit Public-Facing Application
    family: initial-access
    tags: [TA0001]
    description: |
      Adversaries may attempt to exploit a weakness in an internet-
      facing host or system to initially access a network. The
      weakness in the system can be a software bug, a temporary
      glitch, or a misconfiguration.

  T1133:
    name: External Remote Services
    family: initial-access
    tags: [TA0001, TA0003]
    description: |
      Adversaries may leverage external-facing remote services to
      initially access and/or persist within a network. Remote
      services such as VPNs, Citrix, and other access mechanisms
      allow users to connect to internal enterprise network
      resources from external locations.

  T1566:
    name: Phishing
    family: initial-access
    tags: [TA0001]
    description: |
      Adversaries may send phishing messages to gain access to victim
      systems.

  # ---- TA0002 Execution ----

  T1059:
    name: Command and Scripting Interpreter
    family: execution
    tags: [TA0002]
    description: |
      Adversaries may abuse command and script interpreters to
      execute commands, scripts, or binaries.

  T1610:
    name: Deploy Container
    family: execution
    tags: [TA0002, TA0005]
    description: |
      Adversaries may deploy a container into an environment to
      facilitate execution or evade defenses. Includes pods deployed
      to Kubernetes clusters and containers run on ECS/EKS/etc.

  T1609:
    name: Container Administration Command
    family: execution
    tags: [TA0002]
    description: |
      Adversaries may abuse a container administration service to
      execute commands within a container. Examples include
      kubectl exec and docker exec.

  T1053:
    name: Scheduled Task/Job
    family: execution
    tags: [TA0002, TA0003, TA0004]
    description: |
      Adversaries may abuse task scheduling functionality to
      facilitate initial or recurring execution of malicious code.
      Includes cron jobs, systemd timers, K8s CronJobs.

  # ---- TA0003 Persistence ----

  T1136:
    name: Create Account
    family: persistence
    tags: [TA0003]
    description: |
      Adversaries may create an account to maintain access to
      victim systems. Includes local accounts, domain accounts,
      and cloud accounts.

  "T1136.003":
    name: Cloud Account
    family: persistence
    tags: [TA0003]
    description: |
      Adversaries may create a cloud account to maintain access to
      victim systems.

  T1525:
    name: Implant Internal Image
    family: persistence
    tags: [TA0003]
    description: |
      Adversaries may implant cloud or container images with
      malicious code to establish persistence after gaining
      access to an environment.

  # ---- TA0004 Privilege Escalation ----

  T1611:
    name: Escape to Host
    family: privilege-escalation
    tags: [TA0004]
    description: |
      Adversaries may break out of a container to gain access to
      the underlying host. Privileged containers, hostPath mounts,
      and other container misconfigurations enable this.

  T1548:
    name: Abuse Elevation Control Mechanism
    family: privilege-escalation
    tags: [TA0004, TA0005]
    description: |
      Adversaries may circumvent mechanisms designed to control
      elevated privileges. Includes sudo abuse, setuid binary
      abuse, container privileged-flag abuse.

  # ---- TA0005 Defense Evasion ----

  T1140:
    name: Deobfuscate/Decode Files or Information
    family: defense-evasion
    tags: [TA0005]
    description: |
      Adversaries may use Obfuscated Files or Information to hide
      artifacts of an intrusion from analysis.

  T1562:
    name: Impair Defenses
    family: defense-evasion
    tags: [TA0005]
    description: |
      Adversaries may maliciously modify components of a victim
      environment to hinder or disable defensive mechanisms.

  "T1562.008":
    name: Disable or Modify Cloud Logs
    family: defense-evasion
    tags: [TA0005]
    description: |
      Adversaries may disable cloud logging capabilities and
      integrations to limit what data is collected on their
      activities and avoid detection.

  T1070:
    name: Indicator Removal
    family: defense-evasion
    tags: [TA0005]
    description: |
      Adversaries may delete or modify artifacts generated within
      systems to remove evidence of their presence or hinder
      defenses. Includes deleting logs, command history.

  # ---- TA0006 Credential Access ----

  T1110:
    name: Brute Force
    family: credential-access
    tags: [TA0006]
    description: |
      Adversaries may use brute force techniques to gain access to
      accounts when passwords are unknown or when password hashes
      are obtained.

  T1552:
    name: Unsecured Credentials
    family: credential-access
    tags: [TA0006]
    description: |
      Adversaries may search compromised systems to find and obtain
      insecurely stored credentials. Includes credentials in files,
      configuration files, environment variables, and cloud metadata.

  "T1552.001":
    name: Credentials In Files
    family: credential-access
    tags: [TA0006]
    description: |
      Adversaries may search local file systems and remote file
      shares for files containing insecurely stored credentials.

  "T1552.005":
    name: Cloud Instance Metadata API
    family: credential-access
    tags: [TA0006]
    description: |
      Adversaries may attempt to access the Cloud Instance Metadata
      API to collect credentials and other sensitive data.

  "T1552.007":
    name: Container API
    family: credential-access
    tags: [TA0006]
    description: |
      Adversaries may gather credentials via APIs within a
      containers environment. APIs in these environments, such as
      the Docker API and Kubernetes APIs, allow a user to remotely
      manage their containers and clusters.

  T1556:
    name: Modify Authentication Process
    family: credential-access
    tags: [TA0005, TA0006]
    description: |
      Adversaries may modify authentication mechanisms and processes
      to access user credentials or enable otherwise unwarranted
      access to accounts.

  # ---- TA0007 Discovery ----

  T1087:
    name: Account Discovery
    family: discovery
    tags: [TA0007]
    description: |
      Adversaries may attempt to get a listing of valid accounts,
      usernames, or email addresses on a system or within a
      compromised environment.

  T1538:
    name: Cloud Service Dashboard
    family: discovery
    tags: [TA0007]
    description: |
      An adversary may use a cloud service dashboard GUI with stolen
      credentials to gain useful information from an operational
      cloud environment.

  T1613:
    name: Container and Resource Discovery
    family: discovery
    tags: [TA0007]
    description: |
      Adversaries may attempt to discover containers and other
      resources that are available within a containers environment.

  T1069:
    name: Permission Groups Discovery
    family: discovery
    tags: [TA0007]
    description: |
      Adversaries may attempt to discover group and permission
      settings.

  # ---- TA0008 Lateral Movement ----

  T1021:
    name: Remote Services
    family: lateral-movement
    tags: [TA0008]
    description: |
      Adversaries may use valid accounts to log into a service that
      accepts remote connections, such as telnet, SSH, and VNC.

  "T1021.007":
    name: Cloud Services
    family: lateral-movement
    tags: [TA0008]
    description: |
      Adversaries may log into accessible cloud services within a
      compromised environment using valid credentials.

  T1550:
    name: Use Alternate Authentication Material
    family: lateral-movement
    tags: [TA0005, TA0008]
    description: |
      Adversaries may use alternate authentication material, such
      as password hashes, Kerberos tickets, and application access
      tokens, in order to move laterally within an environment.

  # ---- TA0009 Collection ----

  T1530:
    name: Data from Cloud Storage Object
    family: collection
    tags: [TA0009]
    description: |
      Adversaries may access data from cloud storage objects. Many
      IaaS providers offer solutions for online data storage such as
      Amazon S3, Azure Storage, and Google Cloud Storage.

  T1213:
    name: Data from Information Repositories
    family: collection
    tags: [TA0009]
    description: |
      Adversaries may leverage information repositories to mine
      valuable information. Information repositories are tools that
      allow for storage of information, typically to facilitate
      collaboration or information sharing between users.

  # ---- TA0010 Exfiltration ----

  T1567:
    name: Exfiltration Over Web Service
    family: exfiltration
    tags: [TA0010]
    description: |
      Adversaries may use an existing, legitimate external web
      service to exfiltrate data rather than their primary
      command-and-control channel.

  T1041:
    name: Exfiltration Over C2 Channel
    family: exfiltration
    tags: [TA0010]
    description: |
      Adversaries may steal data by exfiltrating it over an
      existing command and control channel.

  # ---- TA0011 Command and Control ----

  T1071:
    name: Application Layer Protocol
    family: command-and-control
    tags: [TA0011]
    description: |
      Adversaries may communicate using OSI application layer
      protocols to avoid detection/network filtering by blending in
      with existing traffic.

  T1090:
    name: Proxy
    family: command-and-control
    tags: [TA0011]
    description: |
      Adversaries may use a connection proxy to direct network
      traffic between systems or act as an intermediary for network
      communications to a command and control server to avoid
      direct connections to their infrastructure.

  # ---- TA0040 Impact ----

  T1485:
    name: Data Destruction
    family: impact
    tags: [TA0040]
    description: |
      Adversaries may destroy data and files on specific systems or
      in large numbers on a network to interrupt availability of
      systems, services, and network resources.

  T1486:
    name: Data Encrypted for Impact
    family: impact
    tags: [TA0040]
    description: |
      Adversaries may encrypt data on target systems or on large
      numbers of systems in a network to interrupt availability to
      system and network resources. Ransomware variants typically
      use this technique.

  T1490:
    name: Inhibit System Recovery
    family: impact
    tags: [TA0040]
    description: |
      Adversaries may delete or remove built-in operating system
      data and turn off services designed to aid in the recovery of
      a corrupted system to prevent recovery.

  T1496:
    name: Resource Hijacking
    family: impact
    tags: [TA0040]
    description: |
      Adversaries may leverage the resources of co-opted systems in
      order to solve resource intensive problems, which may impact
      system and/or hosted service availability. Cryptojacking is
      the canonical example.

  T1565:
    name: Data Manipulation
    family: impact
    tags: [TA0040]
    description: |
      Adversaries may insert, delete, or manipulate data in order to
      influence external outcomes or hide activity, thus threatening
      the integrity of the data.
