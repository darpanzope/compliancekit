{{define "base"}}<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>{{ .Title }} · compliancekit</title>
<style>
/* ─── compliancekit serve — v1.3 minimal UI shell ───────────────
   Hand-written CSS for the phase-11 shell. The full Tailwind +
   Preline build pipeline lands at v1.4 phase 0 — this is the
   stand-in so login + scans-list + providers + checks browser
   render usefully without the bundler.
   Palette mirrors internal/report/assets/template.html so the
   v1.2 HTML report (served at /scans/:id) feels at home inside
   the daemon chrome. */
:root, [data-theme="dark"] {
  --bg: #0f1115;
  --panel: #1a1d23;
  --panel-2: #232830;
  --border: #2f3641;
  --text: #e7e9ee;
  --muted: #8a93a3;
  --accent: #5b8def;
  --status-pass: #6bdf8e;
  --status-fail: #ff5252;
  --status-skip: #8a93a3;
  --status-error: #ff8a3d;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 14px; line-height: 1.5; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

nav.chrome {
  display: flex;
  align-items: center;
  padding: 12px 24px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  gap: 16px;
}
nav.chrome .brand {
  font-weight: 600;
  letter-spacing: -0.01em;
  font-size: 16px;
  color: var(--text);
}
nav.chrome ul {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  gap: 4px;
  flex: 1;
}
nav.chrome ul li a {
  display: inline-block;
  padding: 6px 12px;
  border-radius: 6px;
  color: var(--muted);
  font-size: 13px;
}
nav.chrome ul li a.active {
  background: var(--panel-2);
  color: var(--text);
}
nav.chrome ul li a:hover { color: var(--text); text-decoration: none; }
nav.chrome .user {
  color: var(--muted);
  font-size: 12px;
}
nav.chrome .user form { display: inline; }
nav.chrome .user button.logout {
  background: transparent;
  color: var(--muted);
  border: 0;
  cursor: pointer;
  padding: 0 0 0 8px;
  font-family: inherit;
  font-size: 12px;
}
nav.chrome .user button.logout:hover { color: var(--text); }

main.shell {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px;
}
h1.page-title {
  margin: 0 0 8px;
  font-size: 22px;
  letter-spacing: -0.01em;
}
p.page-sub {
  color: var(--muted);
  margin: 0 0 24px;
}
.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
}

table.list {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
table.list thead th {
  text-align: left;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  font-size: 11px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
}
table.list tbody td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
}
table.list tbody tr:last-child td { border-bottom: none; }
table.list tbody tr:hover { background: var(--panel-2); }

.status-pill {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  border: 1px solid currentColor;
}
.status-pill.queued    { color: var(--muted); }
.status-pill.running   { color: var(--accent); }
.status-pill.completed { color: var(--status-pass); }
.status-pill.failed    { color: var(--status-fail); }
.status-pill.canceled  { color: var(--muted); }

.muted   { color: var(--muted); }
.mono    { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }

.alert {
  margin: 0 0 16px;
  padding: 10px 14px;
  border-radius: 6px;
  border: 1px solid currentColor;
  background: var(--panel);
  font-size: 13px;
}
.alert.error { color: var(--status-fail); }
.alert.info  { color: var(--accent); }

/* Login layout — single centered card, no chrome. */
body.login {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}
.login-card {
  width: 360px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 32px;
}
.login-card h1 {
  margin: 0 0 24px;
  font-size: 20px;
  letter-spacing: -0.01em;
  text-align: center;
}
.login-card label {
  display: block;
  margin: 12px 0 4px;
  font-size: 12px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.login-card input {
  display: block;
  width: 100%;
  padding: 10px 12px;
  background: var(--panel-2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 14px;
  font-family: inherit;
}
.login-card input:focus { outline: none; border-color: var(--accent); }
.login-card button {
  margin-top: 20px;
  width: 100%;
  padding: 10px;
  background: var(--accent);
  color: var(--bg);
  border: 0;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}
.login-card button:hover { opacity: 0.9; }
.login-card .footer-link {
  text-align: center;
  margin-top: 16px;
  font-size: 12px;
  color: var(--muted);
}
</style>
</head>
<body{{ if .LoginPage }} class="login"{{ end }}>
{{ if not .LoginPage }}
<nav class="chrome">
  <span class="brand">compliancekit</span>
  <ul>
    <li><a href="/scans"     {{ if eq .Active "scans"     }}class="active"{{ end }}>Scans</a></li>
    <li><a href="/providers" {{ if eq .Active "providers" }}class="active"{{ end }}>Providers</a></li>
    <li><a href="/checks"    {{ if eq .Active "checks"    }}class="active"{{ end }}>Checks</a></li>
  </ul>
  {{ if .User }}
  <span class="user">
    {{ .User.Email }}
    <form action="/logout" method="post" style="display:inline">
      <input type="hidden" name="csrf_token" value="{{ .CSRFToken }}">
      <button type="submit" class="logout">log out</button>
    </form>
  </span>
  {{ end }}
</nav>
{{ end }}
<main class="shell">
{{ template "content" . }}
</main>
</body>
</html>{{end}}
