{{ define "assignee_widget" }}
<div id="assignee-widget-{{ .FindingID }}" class="ck-card p-3 text-xs" x-data="{ editing: false }"
     @htmx:after-request="if ($event.detail.successful) window.ck.toast({variant:'success',title:'Assignee updated'})">
  <div class="flex items-center justify-between gap-2">
    <div class="text-[11px] uppercase tracking-wider text-muted-foreground">Assignee</div>
    <button type="button" @click="editing = !editing"
            class="text-[11px] text-primary hover:underline">
      <span x-show="!editing">{{ if .Current.AssigneeID }}change{{ else }}assign{{ end }}</span>
      <span x-show="editing" x-cloak>cancel</span>
    </button>
  </div>
  <div class="mt-1.5">
    {{ if .Current.AssigneeID }}
      <span class="font-medium">{{ if .Current.AssigneeName }}{{ .Current.AssigneeName }}{{ else }}{{ .Current.AssigneeEmail }}{{ end }}</span>
    {{ else }}
      <span class="text-muted-foreground">Unassigned</span>
    {{ end }}
  </div>
  <!-- v1.18 phase 9 — optimistic close: the edit panel collapses the
       instant the operator hits Save; the server swap reconciles the
       widget content + the success toast confirms. A failed request
       fires the global error toast (app.js htmx:responseError). -->
  <form x-show="editing" x-cloak class="mt-2 space-y-2"
        hx-post="/findings/{{ .FindingID }}/assign"
        hx-target="#assignee-widget-{{ .FindingID }}"
        hx-swap="outerHTML"
        @htmx:before-request="editing = false">
    <input type="hidden" name="csrf_token" value="{{ .CSRFToken }}">
    <select name="user_id" class="ck-input text-xs w-full">
      <option value="">— unassigned —</option>
      {{ range .Options }}
      <option value="{{ .ID }}" {{ if eq .ID $.Current.AssigneeID }}selected{{ end }}>{{ .Label }}</option>
      {{ end }}
    </select>
    <div class="flex items-center justify-end gap-1.5">
      <button type="submit"
              class="inline-flex h-7 items-center rounded-md bg-primary text-primary-foreground px-2.5 text-[11px] font-medium hover:opacity-90 transition">
        Save
      </button>
    </div>
  </form>
</div>
{{ end }}
