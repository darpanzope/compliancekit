# compliancekit GitHub Action -- composite.
#
# This file is the source-of-truth for the `darpanzope/compliancekit-action@v1`
# Action. At v0.5.0 release time, the contents of this directory are
# copied into a separate public repo (darpanzope/compliancekit-action),
# tagged v1.0.0 there, and the major-version mutable tag `v1` is moved
# to point at it. The dedicated repo is what users reference; the
# canonical source lives here so changes happen alongside the binary.
#
# Composite (not Docker container, not JavaScript) because:
#
#   - The binary already cross-compiles to linux/amd64 and linux/arm64.
#     A composite action that downloads the appropriate prebuilt
#     binary is faster (no image pull, no docker daemon round-trip)
#     and more transparent (the recipe is shell, readable in the
#     action.yaml).
#   - Docker container actions cannot access $GITHUB_WORKSPACE
#     symlinks or arbitrary host paths without explicit mounts; that
#     friction is real for an action whose primary input is files
#     in the workspace.

name: compliancekit-scan
# Marketplace caps description at 125 chars (counted below).
# v0.5-era version was 76 chars; v0.12 long-form sat at 211 and was
# rejected on first publish attempt. Keep this line at or below 125.
description: Compliance scanning in CI. Cloud + Kubernetes + Linux. Audit-ready evidence packs across 7 frameworks.
author: darpanzope
branding:
  icon: shield
  color: blue

inputs:
  version:
    description: |
      compliancekit version to install (without the leading 'v').
      Default 'latest' resolves the highest published release.
    required: false
    default: latest

  providers:
    description: |
      Comma-separated provider list to scan, e.g. 'digitalocean,linux'.
      If empty, scans every provider enabled in the config file.
    required: false
    default: ''

  config-file:
    description: |
      Path to a compliancekit.yaml relative to the workspace.
      Optional; if absent, compliancekit falls back to its built-in defaults
      and provider-specific environment variables.
    required: false
    default: ''

  inventory:
    description: |
      Path to a Linux inventory.yaml. Only consulted when scanning the linux
      provider. Ignored otherwise.
    required: false
    default: ''

  frameworks:
    description: |
      Comma-separated framework filter, e.g. 'soc2,iso27001'.
      Restricts the checks executed to those mapping at least one
      control in one of the named frameworks. Empty means no filter.
    required: false
    default: ''

  output:
    description: |
      Comma-separated output formats: json, markdown, sarif, ocsf, html.
      Default 'sarif,markdown,json' covers Code Scanning ingestion,
      PR comments, and downstream evidence pack generation.
    required: false
    default: sarif,markdown,json

  out-dir:
    description: Directory where compliancekit writes report files.
    required: false
    default: ./out

  fail-on:
    description: |
      Severity threshold at which the action exits non-zero. Accepts
      critical, high, medium, low, info, or 'never' to disable the
      gate. Default 'high'.
    required: false
    default: high

  evidence:
    description: |
      Whether to also generate an evidence pack after the scan.
      Set 'true' to produce <out-dir>/evidence/ alongside the reports.
    required: false
    default: 'false'

  evidence-period:
    description: |
      Audit period label written into the evidence pack
      (e.g. '2026-Q2'). Defaults to the current calendar quarter.
    required: false
    default: ''

  upload-sarif:
    description: |
      Whether to automatically upload SARIF output to the GitHub
      Code Scanning tab. Requires the 'security-events: write'
      permission on the calling workflow's job.
    required: false
    default: 'true'

  upload-evidence-pack:
    description: |
      Whether to upload the generated evidence pack as a workflow
      artifact (via actions/upload-artifact@v4). Only effective when
      `evidence: true` AND a findings.json is produced. Default 'false'
      to keep the action's artifact footprint small for users who
      don't want to ship the pack out of CI.
    required: false
    default: 'false'

  evidence-artifact-name:
    description: |
      Name of the workflow artifact written when upload-evidence-pack
      is true. Defaults to 'compliancekit-evidence-pack'.
    required: false
    default: compliancekit-evidence-pack

  evidence-artifact-retention-days:
    description: |
      Retention window (days) for the uploaded evidence-pack artifact.
      0 = use the org/repo default. Maximum per GitHub is 90 for
      public repos, 400 for private/internal.
    required: false
    default: '0'

outputs:
  reports-dir:
    description: Absolute path to the output directory the scan wrote.
    value: ${{ steps.scan.outputs.reports-dir }}
  evidence-dir:
    description: Absolute path to the evidence pack (empty when evidence=false).
    value: ${{ steps.evidence.outputs.evidence-dir }}

runs:
  using: composite
  steps:
    - name: Resolve compliancekit version
      id: resolve
      shell: bash
      run: |
        set -eu
        VERSION="${{ inputs.version }}"
        if [ "$VERSION" = "latest" ] || [ -z "$VERSION" ]; then
          VERSION=$(curl -sSfL https://api.github.com/repos/darpanzope/compliancekit/releases/latest \
            | grep '"tag_name":' | head -n1 | sed -E 's/.*"v?([^"]+)".*/\1/')
        fi
        if [ -z "$VERSION" ]; then
          echo "could not resolve compliancekit version" >&2
          exit 1
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Install compliancekit
      shell: bash
      env:
        VERSION: ${{ steps.resolve.outputs.version }}
      run: |
        set -eu
        os=$(uname -s | tr '[:upper:]' '[:lower:]')
        arch=$(uname -m)
        case "$arch" in
          x86_64|amd64) arch=amd64 ;;
          aarch64|arm64) arch=arm64 ;;
          *) echo "unsupported architecture $arch" >&2; exit 1 ;;
        esac
        asset="compliancekit_${VERSION}_${os}_${arch}.tar.gz"
        base="https://github.com/darpanzope/compliancekit/releases/download/v${VERSION}"
        tmp=$(mktemp -d)
        curl -sSfL -o "${tmp}/${asset}" "${base}/${asset}"
        curl -sSfL -o "${tmp}/checksums.txt" "${base}/checksums.txt"
        ( cd "$tmp" && grep "  ${asset}\$" checksums.txt | sha256sum -c - )
        tar -xzf "${tmp}/${asset}" -C "$tmp"
        sudo install -m 0755 "${tmp}/compliancekit" /usr/local/bin/compliancekit
        compliancekit version

    - name: Run compliancekit doctor
      shell: bash
      env:
        CK_CONFIG: ${{ inputs.config-file }}
      run: |
        if [ -n "${CK_CONFIG}" ] && [ -f "${CK_CONFIG}" ]; then
          compliancekit doctor --config "${CK_CONFIG}"
        else
          compliancekit doctor || true
        fi

    - name: Scan
      id: scan
      shell: bash
      env:
        CK_CONFIG: ${{ inputs.config-file }}
        CK_PROVIDERS: ${{ inputs.providers }}
        CK_OUTPUT: ${{ inputs.output }}
        CK_OUT_DIR: ${{ inputs.out-dir }}
        CK_FAIL_ON: ${{ inputs.fail-on }}
      run: |
        set -eu
        mkdir -p "${CK_OUT_DIR}"

        # v0.22 — multi-provider input. Previously only the first
        # comma-separated provider was forwarded; now we loop one
        # `compliancekit scan` per provider into a per-provider
        # out-dir + concatenate the findings.json arrays via jq.
        # Single-provider input (the common case) takes the same
        # path with a 1-element list — no behavior change.

        run_one_scan() {
          local provider="$1"
          local out_subdir="$2"
          mkdir -p "${out_subdir}"
          local args=(scan)
          [ -n "${provider}" ] && args+=("${provider}")
          [ -n "${CK_CONFIG}" ] && [ -f "${CK_CONFIG}" ] && args+=(--config "${CK_CONFIG}")
          args+=(--out-dir "${out_subdir}")
          args+=(--output "${CK_OUTPUT}")
          if [ "${CK_FAIL_ON}" != "never" ]; then
            args+=(--fail-on "${CK_FAIL_ON}")
          fi
          echo "+ compliancekit ${args[*]}"
          set +e
          compliancekit "${args[@]}"
          local rc=$?
          set -e
          echo "${rc}"
        }

        worst_rc=0

        if [ -z "${CK_PROVIDERS}" ]; then
          # No provider input — single scan against every enabled provider.
          worst_rc=$(run_one_scan "" "${CK_OUT_DIR}")
        else
          # Multi-provider: per-provider out-dirs + final findings.json
          # merge at CK_OUT_DIR/findings.json.
          IFS=',' read -ra PROVS <<< "${CK_PROVIDERS}"
          merged_findings="${CK_OUT_DIR}/findings.json"
          per_provider_files=()
          for prov in "${PROVS[@]}"; do
            prov="$(echo "${prov}" | xargs)"  # trim whitespace
            [ -z "${prov}" ] && continue
            sub="${CK_OUT_DIR}/${prov}"
            rc=$(run_one_scan "${prov}" "${sub}")
            [ "${rc}" -gt "${worst_rc}" ] && worst_rc="${rc}"
            [ -f "${sub}/findings.json" ] && per_provider_files+=("${sub}/findings.json")
          done
          # Merge per-provider findings.json arrays via jq when available.
          if command -v jq >/dev/null 2>&1 && [ ${#per_provider_files[@]} -gt 0 ]; then
            jq -s 'add' "${per_provider_files[@]}" > "${merged_findings}"
            echo "+ merged ${#per_provider_files[@]} per-provider findings.json → ${merged_findings}"
          fi
        fi

        abs_out=$(cd "${CK_OUT_DIR}" && pwd)
        echo "reports-dir=${abs_out}" >> "$GITHUB_OUTPUT"
        echo "scan-rc=${worst_rc}" >> "$GITHUB_OUTPUT"

    - name: Upload SARIF to Code Scanning
      if: ${{ inputs.upload-sarif == 'true' && contains(inputs.output, 'sarif') }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.scan.outputs.reports-dir }}/findings.sarif
        category: compliancekit

    - name: Generate evidence pack
      id: evidence
      if: ${{ inputs.evidence == 'true' && contains(inputs.output, 'json') }}
      shell: bash
      env:
        CK_PERIOD: ${{ inputs.evidence-period }}
        CK_REPORTS: ${{ steps.scan.outputs.reports-dir }}
      run: |
        set -eu
        ARGS=(evidence --in "${CK_REPORTS}/findings.json" --out "${CK_REPORTS}/evidence")
        [ -n "${CK_PERIOD}" ] && ARGS+=(--period "${CK_PERIOD}")
        compliancekit "${ARGS[@]}"
        abs_evidence=$(cd "${CK_REPORTS}/evidence" && pwd)
        echo "evidence-dir=${abs_evidence}" >> "$GITHUB_OUTPUT"

    # v0.22 — optional workflow-artifact upload of the evidence pack.
    # Opt-in via upload-evidence-pack: true. Stays off by default to
    # keep small repos from accidentally retaining large packs.
    - name: Upload evidence pack as workflow artifact
      if: ${{ inputs.upload-evidence-pack == 'true' && steps.evidence.outputs.evidence-dir != '' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.evidence-artifact-name }}
        path: ${{ steps.evidence.outputs.evidence-dir }}
        retention-days: ${{ inputs.evidence-artifact-retention-days }}
        if-no-files-found: warn

    - name: Propagate scan exit code
      shell: bash
      env:
        SCAN_RC: ${{ steps.scan.outputs.scan-rc }}
      run: |
        if [ "${SCAN_RC}" -ne 0 ]; then
          echo "compliancekit scan exited with code ${SCAN_RC}" >&2
          exit "${SCAN_RC}"
        fi
