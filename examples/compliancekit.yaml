# compliancekit.yaml - example configuration
#
# See CONFIGURATION.md for the full schema reference, defaults, and env
# var conventions. Anything omitted here falls back to a built-in default.

project: acme-saas
environment: prod

providers:
  digitalocean:
    enabled: true
    token_env: DO_API_TOKEN     # the env var holding your read-scope token

  # Uncomment to enable Linux SSH scanning (v0.2+).
  # linux:
  #   enabled: true
  #   inventory: ./inventory.yaml
  #   ssh:
  #     user: ops
  #     key_file: ~/.ssh/id_ed25519
  #     timeout: 10s
  #     max_parallel: 16

  # Uncomment to enable AWS scanning (v0.7+).
  # aws:
  #   enabled: true
  #   regions: []        # empty means "all regions visible to the credential"
  #   # profile: prod    # overrides AWS_PROFILE
  #   # role_arn: ...    # assume this role after loading base creds

  # Uncomment to enable GCP scanning (v0.8+). Authentication uses
  # Application Default Credentials (GOOGLE_APPLICATION_CREDENTIALS,
  # gcloud, GCE metadata, or Workload Identity Federation).
  # gcp:
  #   enabled: true
  #   projects: []       # empty means "use the credential's default project"

frameworks:
  - soc2
  - cis-v8

severity:
  fail_on: high     # exit non-zero on any finding at this severity or above
  min_report: info  # drop findings below this from output

output:
  format: [json]    # add 'html', 'markdown', 'sarif', 'json-ocsf' from v0.3+
  out_dir: ./out
  evidence: false   # set to true to generate the audit-ready evidence pack (v0.4+)
