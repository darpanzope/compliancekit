# compliancekit.yaml — Trivy native JSON ingest quickstart.
#
# v0.14 recommends the trivy-json format over the generic SARIF
# adapter (also supported) — native JSON carries per-package CVE
# detail, canonical PURLs, fixed-version, image SHA digests, and
# the rich Description + Resolution text Trivy ships in JSON but
# truncates in SARIF. CVE-prefixed rules attribute to the default
# vulnerability-management framework set (SOC 2 CC7.1, NIST SI-2,
# ISO A.8.8, PCI 6.3, CIS 7.1) without operator override.
#
# CI flow (image scan, the highest-leverage Trivy use case):
#
#   trivy image --format=json --output=trivy-image.json ghcr.io/acme/api:v2.0
#   compliancekit scan --config=compliancekit.yaml --evidence true
#
# Or standalone:
#
#   compliancekit ingest --format=trivy-json --in=trivy-image.json \
#       --tool=trivy --tool-version=v0.50.4 --out=findings-trivy.json
#
# When a native K8s scan runs alongside (providers.kubernetes.enabled),
# v0.14's image-SHA correlation joins each CVE finding to every Pod
# / Deployment running the affected image so the evidence pack
# shows the upstream CVE under both the image AND the cloud
# resources actually exposed.

project: acme-ci
environment: prod

providers:
  kubernetes:
    enabled: true

frameworks:
  - soc2
  - iso27001
  - cis-v8
  - nist-800-53-r5
  - pci-dss-v4

ingest:
  - format: trivy-json
    file: ./trivy-image.json
    tool: trivy
    tool_version: v0.50.4

severity:
  fail_on: high
  min_report: low

output:
  format: [json, markdown, sarif]
  out_dir: ./out
  evidence: true
